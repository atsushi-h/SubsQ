name: Database Migration
run-name: Database Migration on ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for migration'
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prd

jobs:
  migrate:
    name: Run Migration (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    env:
      # マイグレーションには直接接続（Direct connection）を使用
      # - DATABASE_URL_DIRECT: スキーマ変更など特殊な操作に適した直接接続（poolerなし）
      # - DATABASE_URL: アプリケーション実行時に使用するPooled connection（APIサーバーなど）
      DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup mise
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          working_directory: backend

      - name: Cache Go modules
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Validate DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set for ${{ inputs.environment }} environment"
            echo "::error::Please ensure DATABASE_URL_DIRECT secret is configured in ${{ inputs.environment }} environment"
            exit 1
          fi
          echo "::notice::DATABASE_URL (direct connection) is configured for ${{ inputs.environment }} environment"

      - name: Display migration files
        run: |
          echo "=== Migration files to be applied ==="
          ls -lh migrations/*.sql || echo "No SQL files found"

      - name: Run migrations
        run: |
          echo "Starting migration for ${{ inputs.environment }} environment..."
          migrate -path migrations -database "$DATABASE_URL" up
          echo "Migration completed successfully"

      - name: Report success
        if: success()
        run: |
          echo "::notice::Migration to ${{ inputs.environment }} environment completed successfully"

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Migration to ${{ inputs.environment }} environment failed"
