name: Terraform State Migration (Cloudflare v5)
run-name: Cloudflare Provider v5 State Migration

# Cloudflare provider v4→v5 アップグレードに伴うstate移行
# 旧リソース型をstateから削除し、新リソース型としてimportする一回限りの作業
# 実行後はこのワークフローを削除してよい

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  migrate:
    name: State Migration (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev

    defaults:
      run:
        working-directory: terraform/environments/dev

    env:
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
      TF_VAR_better_auth_url: ${{ secrets.BETTER_AUTH_URL }}
      TF_VAR_next_public_app_url: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      TF_VAR_next_public_contact_form_url: ${{ secrets.NEXT_PUBLIC_CONTACT_FORM_URL }}
      TF_VAR_billing_account_id: ${{ secrets.BILLING_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.TERRAFORM_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.14.3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET_NAME }}"

      # -------------------------------------------------------
      # Step 1: Cloudflare APIで既存リソースのIDを取得
      # -------------------------------------------------------
      - name: Fetch Cloudflare Resource IDs
        id: cf_ids
        env:
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # DNSレコードID (dev.subsq-app.com)
          DNS_RECORD_ID=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=dev.subsq-app.com" \
            -H "Authorization: Bearer ${CF_TOKEN}" | jq -r '.result[0].id // empty')
          echo "dns_record_id=${DNS_RECORD_ID}" >> $GITHUB_OUTPUT
          echo "DNS Record ID: ${DNS_RECORD_ID}"

          # Ruleset ID (http_request_cache_settings フェーズ)
          RULESET_ID=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets" \
            -H "Authorization: Bearer ${CF_TOKEN}" | \
            jq -r '.result[] | select(.phase == "http_request_cache_settings") | .id // empty')
          echo "ruleset_id=${RULESET_ID}" >> $GITHUB_OUTPUT
          echo "Ruleset ID: ${RULESET_ID}"

          # Zero Trust Access Application ID (名前: dev-dev)
          APP_ID=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/access/apps" \
            -H "Authorization: Bearer ${CF_TOKEN}" | \
            jq -r '.result[] | select(.name == "dev-dev") | .id // empty')
          echo "app_id=${APP_ID}" >> $GITHUB_OUTPUT
          echo "Access App ID: ${APP_ID}"

          # Zero Trust Access Policy ID (名前: dev-email-policy)
          POLICY_ID=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/access/policies" \
            -H "Authorization: Bearer ${CF_TOKEN}" | \
            jq -r '.result[] | select(.name == "dev-email-policy") | .id // empty')
          echo "policy_id=${POLICY_ID}" >> $GITHUB_OUTPUT
          echo "Access Policy ID: ${POLICY_ID}"

      # -------------------------------------------------------
      # Step 2: 旧リソース型をstateから削除（実リソースは消えない）
      # -------------------------------------------------------
      - name: Remove Old Resources from State
        run: |
          # 旧リソース型を削除
          terraform state rm 'module.cloudflare.cloudflare_record.app' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zone_settings_override.app' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_ruleset.cache_rules' || \
            terraform state rm 'module.cloudflare.cloudflare_ruleset.cache_rules[0]' || \
            echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zero_trust_access_policy.email_policy[0]' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zero_trust_access_application.app[0]' || echo "not in state, skipping"
          # 前回の部分実行で新リソース型がすでにimportされている場合も削除（冪等性確保）
          terraform state rm 'module.cloudflare.cloudflare_dns_record.app' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zone_setting.ssl' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zone_setting.always_use_https' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zone_setting.min_tls_version' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zone_setting.security_header' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zone_setting.brotli' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zero_trust_access_application.app[0]' || echo "not in state, skipping"
          terraform state rm 'module.cloudflare.cloudflare_zero_trust_access_policy.email_policy[0]' || echo "not in state, skipping"

      # -------------------------------------------------------
      # Step 3: 新リソース型としてimport
      # -------------------------------------------------------
      - name: Import DNS Record
        if: steps.cf_ids.outputs.dns_record_id != ''
        env:
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          DNS_RECORD_ID: ${{ steps.cf_ids.outputs.dns_record_id }}
          ALLOWED_EMAILS: ${{ secrets.CLOUDFLARE_ACCESS_ALLOWED_EMAILS }}
        run: |
          terraform import \
            -var="cloudflare_access_allowed_emails=${ALLOWED_EMAILS}" \
            'module.cloudflare.cloudflare_dns_record.app' \
            "${ZONE_ID}/${DNS_RECORD_ID}"

      - name: Import Zone Settings
        env:
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          ALLOWED_EMAILS: ${{ secrets.CLOUDFLARE_ACCESS_ALLOWED_EMAILS }}
        run: |
          for setting in ssl always_use_https min_tls_version security_header brotli; do
            terraform import \
              -var="cloudflare_access_allowed_emails=${ALLOWED_EMAILS}" \
              "module.cloudflare.cloudflare_zone_setting.${setting}" \
              "${ZONE_ID}/${setting}"
          done

      - name: Import Ruleset
        if: steps.cf_ids.outputs.ruleset_id != ''
        env:
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          RULESET_ID: ${{ steps.cf_ids.outputs.ruleset_id }}
          ALLOWED_EMAILS: ${{ secrets.CLOUDFLARE_ACCESS_ALLOWED_EMAILS }}
        run: |
          terraform import \
            -var="cloudflare_access_allowed_emails=${ALLOWED_EMAILS}" \
            'module.cloudflare.cloudflare_ruleset.cache_rules[0]' \
            "${ZONE_ID}/${RULESET_ID}"

      - name: Import Zero Trust Access Application
        if: steps.cf_ids.outputs.app_id != ''
        env:
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_ID: ${{ steps.cf_ids.outputs.app_id }}
          ALLOWED_EMAILS: ${{ secrets.CLOUDFLARE_ACCESS_ALLOWED_EMAILS }}
        run: |
          terraform import \
            -var="cloudflare_access_allowed_emails=${ALLOWED_EMAILS}" \
            'module.cloudflare.cloudflare_zero_trust_access_application.app[0]' \
            "${ACCOUNT_ID}/${APP_ID}"

      - name: Import Zero Trust Access Policy
        if: steps.cf_ids.outputs.app_id != '' && steps.cf_ids.outputs.policy_id != ''
        env:
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_ID: ${{ steps.cf_ids.outputs.app_id }}
          POLICY_ID: ${{ steps.cf_ids.outputs.policy_id }}
          ALLOWED_EMAILS: ${{ secrets.CLOUDFLARE_ACCESS_ALLOWED_EMAILS }}
        run: |
          terraform import \
            -var="cloudflare_access_allowed_emails=${ALLOWED_EMAILS}" \
            'module.cloudflare.cloudflare_zero_trust_access_policy.email_policy[0]' \
            "${ACCOUNT_ID}/${APP_ID}/${POLICY_ID}"

      # -------------------------------------------------------
      # Step 4: planで差分ゼロを確認
      # -------------------------------------------------------
      - name: Verify Migration (terraform plan)
        env:
          ALLOWED_EMAILS: ${{ secrets.CLOUDFLARE_ACCESS_ALLOWED_EMAILS }}
        run: |
          terraform plan -no-color -input=false \
            -var="cloudflare_access_allowed_emails=${ALLOWED_EMAILS}"

      - name: Report Success
        if: success()
        run: echo "::notice::State migration completed. Verify the plan output above shows no unexpected changes."
