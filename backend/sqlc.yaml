version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapter/gateway/db/sqlc/queries"
    schema: "migrations"
    gen:
      go:
        package: "generated"
        out: "internal/adapter/gateway/db/sqlc/generated"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_db_tags: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        sql_package: "pgx/v5"
