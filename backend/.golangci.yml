version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

formatters:
  enable:
    - gofumpt
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - gocyclo
    - misspell
    - errcheck
    - revive
  disable:
    - depguard
  settings:
    gocyclo:
      min-complexity: 25
    errcheck:
      check-type-assertions: true
      check-blank: true
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    paths:
      - internal/adapter/gateway/db/sqlc
      - .gomodcache
      - internal/adapter/gateway/db/mock
      - internal/adapter/http/controller/mock
      - internal/usecase/mock
    rules:
      - text: "error return value not checked.*Close"
      - text: "G108" # false positives on http insecure

issues:
  max-same-issues: 3
  max-issues-per-linter: 0
